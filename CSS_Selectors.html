<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <style>

        /* universal selector */
        
        * {
            color: orange;
        }
        
        /* element selector */
        p {
            color: red;
        }

        /* id selector */
        #para1 {
            color: blue;
        }

        /* class selector */
        .para2 {
            color: green;
        }

        /* grouping selector */
        h1, h2 {
            color: purple;
        }

    </style>

    </head>

    <body>

        <p>Hello, I am a element selector!</p>
        <p id="para1">Hello, I am id selector!</p>
        <p class="para2">Hello, I am class selector!</p>

        <h1>Hello, I am Grouping selector1!</h1>
        <h2>Hello, I am Grouping selector2!</h2>

        
        <h3>Hello, I am Universal Selector<h3>
        <h4>Hello, I am Universal Selector</h4>



    </body>

</html>
