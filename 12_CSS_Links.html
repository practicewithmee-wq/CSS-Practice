<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
    <style>
/* unvisited link */
a:link {
  color: red;
}

/* visited link */
a:visited {
  color: green;
}

/* mouse over link */
a:hover {
  color: rgb(238, 255, 0);
}

/* selected link */
a:active {
  color: blue;
}

a{
  text-decoration: none;
  background-color: rgb(37, 39, 39);
}

.faceBook a{
    color: rgb(0, 38, 255);
}

.faceBook :link, a:visited {
  background-color: white;
  color: black;
  border: 2px solid green;
  padding: 10px 20px;
  text-align: center;
  text-decoration: none;
  display: inline-block;
}

.faceBook :hover, a:active {
  background-color: green;
  color: white;
}

</style>
<body>


<h1>Style Links</h1>

<div class="google">
<a href="https://www.Google.com/" target="_blank">Google</a>
</div>


<!-- link button -->

 <div class="faceBook">
<a href="https://www.facebook.com/" target="_blank">Facebook</a></div>
</body>
</html>
